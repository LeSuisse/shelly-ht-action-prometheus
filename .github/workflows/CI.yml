name: CI

permissions: read-all

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    name: Build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # tag=v31.10.7
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - name: Run GoReleaser
        run: nix develop --command goreleaser release --snapshot --clean
  static_analysis:
    runs-on: ubuntu-24.04
    name: Run static analysis and linting
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # tag=v31.10.7
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - name: golangci-lint
        run: nix develop --command golangci-lint run
